    const { useState, useEffect, useRef } = React;

    /* ── Intersection Observer hook ── */
    function useInView(threshold = 0.12) {
      const ref = useRef(null);
      const [seen, setSeen] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setSeen(true); obs.disconnect(); } }, { threshold });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, seen];
    }

    /* ── Navigation vers une section (offset navbar 80px) ── */
    function goTo(id, e) {
      if (e) e.preventDefault();
      const target = (!id || id === 'top') ? 0 : (() => {
        const el = document.getElementById(id);
        return el ? el.getBoundingClientRect().top + window.pageYOffset - 80 : 0;
      })();
      const start = window.pageYOffset;
      const dist  = target - start;
      const dur   = Math.max(600, Math.min(Math.abs(dist) * 0.6, 1400));
      let t0 = null;
      const ease = t => t < .5 ? 2*t*t : -1+(4-2*t)*t;
      const step = ts => {
        if (!t0) t0 = ts;
        const p = Math.min((ts - t0) / dur, 1);
        window.scrollTo(0, start + dist * ease(p));
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }

    /* ── Global scroll reveal (delayed to let React paint first) ── */
    function useScrollReveal() {
      useEffect(() => {
        let obs;
        const t = setTimeout(() => {
          const els = document.querySelectorAll('.rv,.rl,.rr');
          obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
              if (e.isIntersecting) {
                e.target.classList.add('on');
                obs.unobserve(e.target);
              }
            });
          }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });
          els.forEach(el => obs.observe(el));
        }, 150);
        return () => { clearTimeout(t); if (obs) obs.disconnect(); };
      }, []);
    }

    /* ── Animated counter ── */
    function useCounter(target, duration = 1400) {
      const [val, setVal] = useState(0);
      const [ref, seen] = useInView(0.3);
      useEffect(() => {
        if (!seen) return;
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          setVal(Math.floor(p * target));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [seen]);
      return [ref, val];
    }

    /* ══════════════════════════════════════════

    function CountUp({ to, suffix = '', duration = 1600 }) {
      const [val, setVal] = useState(0);
      const [ref, seen] = useInView(0.3);
      useEffect(() => {
        if (!seen) return;
        let start = null;
        const step = ts => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(ease * to));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [seen]);
      return <span ref={ref}>{val}{suffix}</span>;
    }

    }

    /* VerticalCutReveal: découpe les mots et les anime un par un depuis le bas */
    function WordReveal({ text, seen, className, baseDelay = 0 }) {
      const words = text.split(' ');
      return (
        <span className={className} style={{ display:'inline' }}>
          {words.map((word, i) => (
            <React.Fragment key={i}>
              <span className={`word-wrap${seen ? ' on' : ''}`}>
                <span className={`word-inner wd${i + baseDelay}`}>{word}</span>
              </span>
              {i < words.length - 1 && ' '}
            </React.Fragment>
          ))}
        </span>
      );
    }

                  { icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>, label:'Téléphone', val:'07 63 46 67 43' },
                  { icon:'⚡', label:'Réponse', val:'Sous 24h ouvrées' },
                ].map(item => (
                  <div key={item.label} style={{ display:'flex', alignItems:'center', gap:16 }}>
                    <div style={{ width:48, height:48, borderRadius:14,
                      background:'var(--gray-soft)', fontSize:'1.2rem',
                      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      {item.icon}
                    </div>
                    <div>
                      <div style={{ fontSize:'.72rem', color:'#9CA3AF', fontWeight:600, marginBottom:2 }}>{item.label}</div>
                      <div style={{ fontSize:'.9rem', fontWeight:600, color:'var(--navy)' }}>{item.val}</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Socials */}
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <span style={{ fontSize:'.8rem', color:'#9CA3AF', fontWeight:500 }}>Suivez-moi :</span>
                {socials.map(s => (
                  <a key={s.name} href={s.url || '#'} title={s.name} target={s.url ? '_blank' : undefined} rel={s.url ? 'noopener noreferrer' : undefined}
                    style={{ width:42, height:42, borderRadius:12,
                      background:'var(--gray-soft)', color:'var(--navy)',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      textDecoration:'none', transition:'background .25s ease, color .25s ease' }}
                    onMouseEnter={e => { e.currentTarget.style.background='var(--navy)'; e.currentTarget.style.color='#fff'; }}
                    onMouseLeave={e => { e.currentTarget.style.background='var(--gray-soft)'; e.currentTarget.style.color='var(--navy)'; }}>
                    {s.icon}
                  </a>
                ))}
              </div>
            </div>

            {/* Right – Form */}
            <div className={`rr ${seen?'on':''}`}>
              <div style={{ borderRadius:22, padding:'40px 36px',
                background:'var(--gray-soft)', border:'1px solid rgba(11,29,57,.07)' }}>
                {sent ? (
                  <div style={{ textAlign:'center', padding:'48px 0' }}>
                    <div style={{ width:64, height:64, borderRadius:'50%',
                      background:'rgba(255,122,0,.1)', margin:'0 auto 18px',
                      display:'flex', alignItems:'center', justifyContent:'center' }}>
                      <svg width="28" height="28" fill="none" stroke="var(--orange)" strokeWidth="2.5" strokeLinecap="round">
                        <path d="M5 14l5 5L20 7"/>
                      </svg>
                    </div>
                    <h3 style={{ fontSize:'1.2rem', fontWeight:800, color:'var(--navy)', marginBottom:8 }}>Message envoyé !</h3>
                    <p style={{ color:'#6B7280', fontSize:'.9rem' }}>Je vous recontacte dans les 24 heures.</p>
                  </div>
                ) : (
                  <form action="https://formspree.io/f/mlgvjwwq" method="POST" style={{ display:'flex', flexDirection:'column', gap:22 }}>
                    <div>
                      <label style={{ display:'block', fontSize:'.82rem', fontWeight:700, color:'var(--navy)', marginBottom:8 }}>
                        Nom complet
                      </label>
                      <input type="text" name="name" className="form-input" placeholder="Marie Dupont" required
                        value={form.name} onChange={e => setForm({...form, name:e.target.value})} />
                    </div>
                    <div>
                      <label style={{ display:'block', fontSize:'.82rem', fontWeight:700, color:'var(--navy)', marginBottom:8 }}>
                        Adresse e-mail
                      </label>
                      <input type="email" name="email" className="form-input" placeholder="marie@exemple.com" required
                        value={form.email} onChange={e => setForm({...form, email:e.target.value})} />
                    </div>
                    <div>
                      <label style={{ display:'block', fontSize:'.82rem', fontWeight:700, color:'var(--navy)', marginBottom:8 }}>
                        Téléphone
                      </label>
                      <input type="telephone" name="telephone" className="form-input" placeholder="06.X.X.X.X" required
                        value={form.telephone} onChange={e => setForm({...form, telephone:e.target.value})} />
                    </div>
                    <div>
                      <label style={{ display:'block', fontSize:'.82rem', fontWeight:700, color:'var(--navy)', marginBottom:8 }}>
                        Parlez-moi de votre projet
                      </label>
                      <textarea name="message" className="form-input" placeholder="Décrivez votre activité et vos besoins..." rows={5}
                        style={{ resize:'none' }} required
                        value={form.message} onChange={e => setForm({...form, message:e.target.value})} />
                    </div>
                    <button type="submit" className="btn-p"
                      style={{ padding:'15px 28px', fontSize:'.95rem', width:'100%', borderRadius:14 }}>
                      Envoyer mon message →
                    </button>
                    <p style={{ textAlign:'center', fontSize:'.75rem', color:'#9CA3AF' }}>
                      Appel découverte offert pour toute prise de contact
                    </p>
                  </form>
                )}
              </div>
            </div>
          </div>
          <style>{`@media(min-width:900px){.contact-grid{grid-template-columns:1fr 1fr!important}}`}</style>
        </section>
      );
    }

    /* ══════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════ */
    function Footer() {
      return (
        <footer style={{ background:'var(--navy-dark)', padding:'40px 0' }}>
          <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 28px' }}>
            <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center',
              justifyContent:'space-between', gap:24 }}>

              <div>
                <div style={{ fontWeight:900, fontSize:'1.15rem', color:'#fff', marginBottom:4 }}>
                  <span style={{ color:'var(--orange)' }}>Lilian</span>consult
                </div>
                <div style={{ fontSize:'.8rem', color:'rgba(255,255,255,.35)' }}>
                  Consultant digital pour les indépendants
                </div>
              </div>

              <div style={{ display:'flex', flexWrap:'wrap', gap:24 }}>
                {[['Méthode','#methode'],['Services','#services'],['À propos','#apropos'],['Témoignages','#temoignages'],['Contact','#contact']].map(([l,h]) => (
                  <a key={l} href={h} style={{ fontSize:'.83rem', color:'rgba(255,255,255,.4)',
                    textDecoration:'none', transition:'color .2s ease', fontWeight:500 }}
                    onMouseEnter={e => e.currentTarget.style.color='#fff'}
                    onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,.4)'}>
                    {l}
                  </a>
                ))}
              </div>

              <div style={{ fontSize:'.75rem', color:'rgba(255,255,255,.25)' }}>
                © 2026 Lilian Nelsom. Tous droits réservés.
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ══════════════════════════════════════════
       APP
    ══════════════════════════════════════════ */
    function App() {
      useScrollReveal();
      return (
        <>
          <Navbar />
          <Hero />
          <ProblemSection />
          <ProcessSection />
          <ServicesSection />
          <AboutSection />
          <TestimonialsSection />
          <FinalCTA />
          <ContactSection />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  
</script>
</body>
</html>
